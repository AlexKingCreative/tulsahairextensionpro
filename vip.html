<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client VIP Experience | Tulsa Hair Extension Pro</title>
  <meta name="description" content="Join the Client VIP Experience with Hope Newnam at Tulsa Hair Extension Pro. Exclusive access for returning clients in Tulsa, OK." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #FBF5ED;
      --cream2:     #F5EAD8;
      --cream3:     #EDE0CC;
      --orange:     #E07028;
      --orange-lt:  #F0956A;
      --orange-dk:  #C05A18;
      --peach:      #F2B89A;
      --caramel:    #C8854A;
      --text:       #2A1A0E;
      --text-mid:   #6B5040;
      --text-lt:    #A88878;
      --border:     rgba(200,133,74,0.2);
      --border-lt:  rgba(200,133,74,0.1);
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 56px;
      background: rgba(251,245,237,0.97);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .nav-logo { display: flex; align-items: center; text-decoration: none; }
    .nav-logo img { height: 32px; width: auto; max-width: 150px; }
    .nav-back {
      font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
      color: var(--text-mid); text-decoration: none;
      display: flex; align-items: center; gap: 8px; transition: color 0.25s;
    }
    .nav-back:hover { color: var(--orange); }
    .nav-back-arrow { font-size: 16px; line-height: 1; }

    /* ── PAGE HERO ── */
    .page-hero {
      background: var(--cream2);
      padding: 120px 56px 64px;
      text-align: center;
      border-bottom: 1px solid var(--border-lt);
      position: relative;
      overflow: hidden;
    }
    .page-hero::before {
      content: '✦';
      position: absolute; top: 80px; left: 56px;
      font-size: 120px; color: rgba(200,133,74,0.06);
      font-family: 'Playfair Display', serif; line-height: 1;
      pointer-events: none;
    }
    .page-hero::after {
      content: '✦';
      position: absolute; bottom: 40px; right: 56px;
      font-size: 80px; color: rgba(200,133,74,0.06);
      font-family: 'Playfair Display', serif; line-height: 1;
      pointer-events: none;
    }
    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--orange); font-weight: 500; margin-bottom: 20px;
    }
    .page-eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--orange); }
    .page-title {
      font-family: 'Playfair Display', serif; font-weight: 400;
      font-size: clamp(36px, 5vw, 64px); line-height: 1.1;
      color: var(--text); margin-bottom: 20px;
    }
    .page-title em { font-style: italic; color: var(--orange); }
    .page-subtitle {
      font-size: 16px; line-height: 1.7; color: var(--text-mid);
      max-width: 520px; margin: 0 auto;
    }

    /* ── FORM WRAPPER ── */
    .form-section {
      flex: 1;
      padding: 64px 56px 80px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    /* GHL iframe container */
    .ghl-form-wrap {
      background: var(--cream2);
      border: 1px solid var(--border-lt);
      overflow: hidden;
    }
    .ghl-form-wrap iframe {
      display: block;
      width: 100%;
      border: none;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--text); padding: 40px 56px 28px;
    }
    .footer-top {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 24px; margin-bottom: 32px;
    }
    .footer-logo img { height: 36px; width: auto; max-width: 150px; filter: brightness(10); opacity: 0.8; }
    .footer-socials { display: flex; gap: 12px; }
    .social-pill {
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
      font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
      text-decoration: none; padding: 8px 18px;
      transition: background 0.25s, color 0.25s;
    }
    .social-pill:hover { background: var(--orange); color: #fff; }
    .footer-bottom {
      border-top: 1px solid rgba(255,255,255,0.08); padding-top: 24px;
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;
      font-size: 11px; color: rgba(255,255,255,0.3);
    }
    .footer-cherry {
      color: var(--peach); text-decoration: none; font-size: 11px; transition: color 0.25s;
    }
    .footer-cherry:hover { color: var(--orange-lt); }

    @media (max-width: 760px) {
      nav { padding: 14px 20px; }
      .page-hero { padding: 96px 24px 48px; }
      .page-hero::before, .page-hero::after { display: none; }
      .form-section { padding: 40px 20px 64px; }
      footer { padding: 32px 20px 20px; }
      .footer-top { flex-direction: column; align-items: flex-start; }
      .footer-bottom { flex-direction: column; gap: 6px; font-size: 10px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <img src="https://assets.cdn.filesafe.space/eOLOvMfs3a79iAm2eaMg/media/67fe6bab266b6f6610960ccf.png" alt="Tulsa Hair Extension Pro" />
    </a>
    <a href="index.html" class="nav-back">
      <span class="nav-back-arrow">←</span> Back to Site
    </a>
  </nav>

  <div class="page-hero">
    <div class="page-eyebrow">Exclusive Access</div>
    <h1 class="page-title">Client VIP<br><em>Experience</em></h1>
    <p class="page-subtitle">Reserved for returning clients. Complete the form below to unlock your VIP perks and stay connected with Hope's studio.</p>
  </div>

  <div class="form-section">
    <div class="ghl-form-wrap">
      <iframe
        src="https://api.hairpro360.com/widget/form/HWWUH6vFXGyZL1UPZpQ4"
        id="inline-HWWUH6vFXGyZL1UPZpQ4"
        data-layout="{'id':'INLINE'}"
        data-trigger-type="alwaysShow"
        data-trigger-value=""
        data-activation-type="alwaysActivated"
        data-activation-value=""
        data-deactivation-type="neverDeactivate"
        data-deactivation-value=""
        data-form-name="Client VIP Experience"
        data-height="797"
        data-layout-iframe-id="inline-HWWUH6vFXGyZL1UPZpQ4"
        data-form-id="HWWUH6vFXGyZL1UPZpQ4"
        title="Client VIP Experience"
        style="width:100%;height:797px;"
      ></iframe>
    </div>
  </div>

  <footer>
    <div class="footer-top">
      <div class="footer-logo">
        <img src="https://assets.cdn.filesafe.space/eOLOvMfs3a79iAm2eaMg/media/67fe6bab266b6f6610960ccf.png" alt="Tulsa Hair Extension Pro" loading="lazy" />
      </div>
      <div class="footer-socials">
        <a href="https://instagram.com/tulsahairextensionpro" class="social-pill" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://facebook.com/tulsahairextensionpro" class="social-pill" target="_blank" rel="noopener noreferrer">Facebook</a>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© 2026 Tulsa Hair Extension Pro · Hope Newnam · Tulsa, OK 74135</span>
      <a href="https://withcherry.com" class="footer-cherry" target="_blank" rel="noopener noreferrer">Financing by Cherry Pay ✦</a>
    </div>
  </footer>

  <script src="https://api.hairpro360.com/js/form_embed.js"></script>
</body>
</html>
